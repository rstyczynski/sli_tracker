name: "SLI Event (JS)"
description: |
  JavaScript action: main is a no-op; post emits SLI event to OCI Logging via curl.
  OCI profile must be restored earlier in the job (e.g. ./.github/actions/oci-profile-setup).
  GitHub does not run pre hooks for actions referenced with ./ (local actions), so callers use oci-profile-setup first.

inputs:
  profile:
    description: "OCI profile name."
    required: false
    default: "SLI_TEST"
  log-id:
    description: "OCI log OCID. Falls back to SLI_OCI_LOG_ID environment variable."
    required: false
    default: ""
  outcome:
    description: "SLI outcome override (success|failure|cancelled|skipped). Falls back to GITHUB_JOB_STATUS env var, then 'success'."
    required: false
    default: ""
  oci-api-domain:
    description: "OCI API domain. Override for non-commercial realms (e.g. oraclegovcloud.com)."
    required: false
    default: "oraclecloud.com"

runs:
  using: node20
  main: index.js
  post: post.js
  post-if: always()
