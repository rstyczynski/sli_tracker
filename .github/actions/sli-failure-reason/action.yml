name: "SLI Failure Reason"
description: >
  Writes SLI_FAILURE_REASON_<STEP>=<detail> to GITHUB_ENV so sli-event can pick it up
  as a failure_reasons entry. Use as a companion step when steps-json is not available
  or when you need to override the auto-derived reason for a specific step.

inputs:
  step:
    description: >
      Step identifier (UPPER_SNAKE form recommended, e.g. INIT, PLAN, APPLY).
      The key written to GITHUB_ENV is SLI_FAILURE_REASON_<STEP>.
    required: true
  detail:
    description: "Human-readable detail to store as the reason value."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: "Write failure reason to GITHUB_ENV"
      shell: bash
      run: |
        KEY="SLI_FAILURE_REASON_${{ inputs.step }}"
        VALUE="${{ inputs.detail }}"
        echo "${KEY}=${VALUE}" >> "$GITHUB_ENV"
        echo "::notice::${KEY} set"
