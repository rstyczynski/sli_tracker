name: "MODEL — emit_js (JS action post hook + oci-profile-setup)"
# SLI-16: sli-event-js emits SLI via post hook (curl). OCI config is restored by an explicit
# oci-profile-setup step — pre hooks are not supported for local actions.

on:
  workflow_dispatch:
    inputs:
      simulate-failure:
        description: "Force failure (for SLI testing)"
        type: boolean
        default: false

env:
  SLI_OCI_LOG_ID: ${{ vars.SLI_OCI_LOG_ID }}

jobs:
  emit-js:
    name: "Emit via JS action (oci-profile-setup + post hook)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "OCI profile setup"
        id: oci_profile
        uses: ./.github/actions/oci-profile-setup
        with:
          oci_config_payload: ${{ secrets.OCI_CONFIG_PAYLOAD }}
          profile: SLI_TEST
          oci-auth-mode: none

      - name: "Main step"
        id: step-main
        run: |
          if [[ "${{ inputs.simulate-failure }}" == "true" ]]; then
            echo "::error::Simulated failure triggered for SLI testing"
            exit 1
          fi
          echo "Main step completed successfully"

      - name: "SLI auto-report (post: SLI emit)"
        if: ${{ !cancelled() }}
        uses: ./.github/actions/sli-event-js
        with:
          profile: ${{ steps.oci_profile.outputs.profile }}
          log-id: ${{ vars.SLI_OCI_LOG_ID }}
          outcome: ${{ job.status }}
