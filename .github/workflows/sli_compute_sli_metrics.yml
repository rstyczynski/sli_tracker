name: "SLI-22 — scheduled SLI snapshot (30 min)"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  snapshot:
    name: "Compute + persist SLI snapshot"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Install dependencies"
        run: npm ci

      - name: "Install OCI CLI"
        uses: ./.github/actions/install-oci-cli

      - name: "Restore OCI profile"
        id: oci_profile
        uses: ./.github/actions/oci-profile-setup
        with:
          oci_config_payload: ${{ secrets.OCI_CONFIG_PAYLOAD }}
          profile: SLI_TEST

      - name: "Compute + persist SLI snapshot"
        env:
          COMPARTMENT_OCID: ${{ vars.SLI_OCI_COMPARTMENT_ID }}
          SLI_OCI_LOG_ID: ${{ vars.SLI_OCI_LOG_ID }}
          SLI_METRIC_NAMESPACE: ${{ vars.SLI_METRIC_NAMESPACE || 'sli_tracker' }}
          # Composite output can be empty in edge cases; empty --oci-profile made Node treat profile as DEFAULT.
          OCI_PROFILE_RESTORED: ${{ steps.oci_profile.outputs.profile || 'SLI_TEST' }}
          OCI_CLI_PROFILE: ${{ steps.oci_profile.outputs.profile || 'SLI_TEST' }}
        run: |
          set -euo pipefail
          metric_ns="${SLI_METRIC_NAMESPACE:-sli_tracker}"
          out="$(
            tools/sli_compute_sli_metrics.js \
            --oci-auth config \
            --window-days 30 \
            --mql-resolution 5m \
            --namespace "$metric_ns" \
            --metric-name outcome \
            --compartment-id "$COMPARTMENT_OCID" \
            --oci-config-file "~/.oci/config" \
            --oci-profile "${OCI_PROFILE_RESTORED}" \
            --persist log,metric \
            --persist-log-id "$SLI_OCI_LOG_ID" \
            --persist-metric-namespace "$metric_ns" \
            --output json
          )"

          # Pretty-print when possible, but never fail the job on formatting noise.
          echo "$out" | jq . >/dev/null 2>&1 && echo "$out" | jq . || echo "$out"

