name: "Test OCI profile setup"

# Requires repository secret OCI_CONFIG_PAYLOAD created via scripts/setup_oci_github_access.sh

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "OCI profile name (must match pack from setup script)"
        type: string
        default: DEFAULT
      oci-auth-mode:
        description: "auto (default): detect session vs API-key pack | token_based | none"
        type: choice
        options: [auto, token_based, none]
        default: auto

permissions:
  contents: read

jobs:
  verify:
    name: "install-oci-cli + oci-profile-setup"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI
        uses: ./.github/actions/install-oci-cli

      - name: Restore OCI profile from secret
        uses: ./.github/actions/oci-profile-setup
        with:
          oci_config_payload: ${{ secrets.OCI_CONFIG_PAYLOAD }}
          profile: ${{ inputs.profile }}
          oci-auth-mode: ${{ inputs.oci-auth-mode }}

      - name: Debug OCI profile
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          echo "::group::~/.oci/config"
          cat "${HOME}/.oci/config"
          echo "::endgroup::"
          echo "::group::key_file for profile [${PROFILE}]"
          key_raw="$(
            awk -v want="[${PROFILE}]" '
              function strip(s) { sub(/\r$/, "", s); return s }
              BEGIN { inblk = 0 }
              {
                line = strip($0)
                if (line == want) { inblk = 1; next }
                if (line ~ /^\[/ && inblk) exit
                if (inblk && line ~ /^[[:space:]]*key_file[[:space:]]*=/) {
                  sub(/^[[:space:]]*key_file[[:space:]]*=[[:space:]]*/, "", line)
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
                  if (line ~ /^".*"$/) { gsub(/^"|"$/, "", line) }
                  print line
                  exit
                }
              }
            ' "${HOME}/.oci/config"
          )"
          key_raw="${key_raw/#\~/${HOME}}"
          if [[ -z "${key_raw}" ]]; then
            echo "No key_file= line under [${PROFILE}] (session-token pack may use security_token_file only)."
          else
            echo "key_file (raw): ${key_raw}"
            if [[ -f "${key_raw}" ]]; then
              ls -l "${key_raw}"
              ls -la "$(dirname "${key_raw}")"
            else
              echo "ERROR: key file not found at resolved path: ${key_raw}"
              ls -la "$(dirname "${key_raw}")" 2>/dev/null || true
              exit 1
            fi
          fi
          echo "::endgroup::"

      - name: Verify restored files
        env:
          PROFILE: ${{ inputs.profile }}
        run: |
          test -r "$HOME/.oci/config"
          if [[ -d "$HOME/.oci/sessions/${PROFILE}" ]]; then
            echo "Session directory present (token-based pack)."
          else
            echo "No session directory (API-key / config_profile pack); checking profile section exists."
            grep -q "^\[${PROFILE}\]" "$HOME/.oci/config"
          fi

      - name: Verify OCI access with oci os ns get
        env:
          OCI_CLI_PROFILE: ${{ inputs.profile }}
        run: |
          # Use the restored profile to call a simple, read-only OCI API.
          # This validates that the CLI can authenticate, not just that files exist.
          oci os ns get --profile "$OCI_CLI_PROFILE"
